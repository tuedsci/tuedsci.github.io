{{ define "main" }}
<main id="main" role="main">
    {{ if or .Title .Content }}
    <div>
        {{ with .Title }}<h1>{{ . }}</h1>{{ end }}
        {{ with .Content }}
        <div>{{ . }}</div>
        {{ end }}
    </div>
    {{ end }}

    <div class="post-list">
        {{ range (where .Paginator.Pages "Type" "blog") }}
        {{ .Render "summary" }}
        {{ end }}
    </div>

    {{ partial "pagination.html" . }}
</main>
{{ end }}
