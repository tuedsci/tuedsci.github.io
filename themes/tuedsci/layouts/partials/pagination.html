<div class="paginator">
    {{ if .Paginator.HasPrev }}
    <a class="prev-page" href="{{ .Paginator.Prev.URL }}">Prev</a>
    {{ end }}
    {{ .Paginator.PageNumber }} of {{ .Paginator.TotalPages }}
    {{ if .Paginator.HasNext }}
    <a class="next-page" href="{{ .Paginator.Next.URL }}">Next</a>
    {{ end }}
</div>
